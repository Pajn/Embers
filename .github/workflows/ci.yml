name: CI

on:
  push:
  pull_request:

env:
  FLATBUFFERS_VERSION: 25.12.19

jobs:
  fmt-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flatc
        run: |
          mkdir -p flatbuffers-bin
          asset=""
          for candidate in Linux.flatc.binary.g++-13.zip Linux.flatc.binary.clang++-18.zip; do
            if curl -fsSL -o flatbuffers-bin/flatc.zip "https://github.com/google/flatbuffers/releases/download/v${FLATBUFFERS_VERSION}/${candidate}"; then
              asset="${candidate}"
              break
            fi
          done
          test -n "${asset}"
          unzip -q flatbuffers-bin/flatc.zip -d flatbuffers-bin
          chmod +x flatbuffers-bin/flatc
          sudo install flatbuffers-bin/flatc /usr/local/bin/flatc
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flatc
        run: |
          mkdir -p flatbuffers-bin
          asset=""
          for candidate in Linux.flatc.binary.g++-13.zip Linux.flatc.binary.clang++-18.zip; do
            if curl -fsSL -o flatbuffers-bin/flatc.zip "https://github.com/google/flatbuffers/releases/download/v${FLATBUFFERS_VERSION}/${candidate}"; then
              asset="${candidate}"
              break
            fi
          done
          test -n "${asset}"
          unzip -q flatbuffers-bin/flatc.zip -d flatbuffers-bin
          chmod +x flatbuffers-bin/flatc
          sudo install flatbuffers-bin/flatc /usr/local/bin/flatc
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit and integration tests
        run: cargo test --workspace

  pty-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flatc
        run: |
          mkdir -p flatbuffers-bin
          asset=""
          for candidate in Linux.flatc.binary.g++-13.zip Linux.flatc.binary.clang++-18.zip; do
            if curl -fsSL -o flatbuffers-bin/flatc.zip "https://github.com/google/flatbuffers/releases/download/v${FLATBUFFERS_VERSION}/${candidate}"; then
              asset="${candidate}"
              break
            fi
          done
          test -n "${asset}"
          unzip -q flatbuffers-bin/flatc.zip -d flatbuffers-bin
          chmod +x flatbuffers-bin/flatc
          sudo install flatbuffers-bin/flatc /usr/local/bin/flatc
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ignored PTY smoke test
        run: cargo test -p embers-test-support pty_round_trips_input -- --ignored
